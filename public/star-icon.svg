<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background gradient container -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f051d" />
      <stop offset="100%" stop-color="#05020c" />
    </linearGradient>
    <linearGradient id="star-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8b4fe" />
      <stop offset="50%" stop-color="#fbcfe8" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base App Icon Mask Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />

  <!-- Outer ambient glowing circle -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="rgba(216, 180, 254, 0.12)" stroke-width="4" stroke-dasharray="16 8" />

  <!-- Inner ambient glowing circle -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="rgba(244, 114, 182, 0.08)" stroke-width="2" />

  <!-- Main glowing star symbol (4-point star with sparkles) -->
  <g filter="url(#glow)">
    <!-- 4 Point Star Path -->
    <path d="M 256 96 C 256 180 180 256 96 256 C 180 256 256 332 256 416 C 256 332 332 256 416 256 C 332 256 256 180 256 96 Z" fill="url(#star-grad)" />
    
    <!-- Core bright spot -->
    <circle cx="256" cy="256" r="12" fill="#ffffff" />
  </g>

  <!-- Accent Sparkles -->
  <circle cx="160" cy="160" r="6" fill="#ffffff" opacity="0.8" filter="url(#glow)" />
  <circle cx="352" cy="362" r="5" fill="#fbcfe8" opacity="0.6" />
  <circle cx="340" cy="140" r="4" fill="#d8b4fe" opacity="0.7" />
  <circle cx="150" cy="330" r="5" fill="#ffffff" opacity="0.5" />
</svg>
